  const edges = [[0,2],[0,3],[1,2],[2,3],[3,4],[1,5],[2,6],[5,6],[6,7],[3,7],[4,8],[7,8],[6,9],[9,10],[10,11],[7,11],[8,11],[8,12],[5,9],[9,7]];
  const warmIdx = 3, amberIdx = 9;
  return (
    <svg width={size} height={size} viewBox="0 0 120 120" fill="none" aria-label="SysBioEng logo">
      <defs>
        <linearGradient id={`flux-${id}`} x1="0" y1="0" x2="1" y2="1">
          <stop offset="0" stopColor={BRAND.TEAL_LITE}/>
          <stop offset="0.5" stopColor={BRAND.TEAL_MID}/>
          <stop offset="1" stopColor={BRAND.TEAL_DEEP}/>
        </linearGradient>
        <radialGradient id={`glow-${id}`} cx="0.5" cy="0.5" r="0.5">
          <stop offset="0" stopColor={BRAND.WARM} stopOpacity="0.55"/>
          <stop offset="1" stopColor={BRAND.WARM} stopOpacity="0"/>
        </radialGradient>
        <radialGradient id={`glow2-${id}`} cx="0.5" cy="0.5" r="0.5">
          <stop offset="0" stopColor={BRAND.AMBER} stopOpacity="0.55"/>
          <stop offset="1" stopColor={BRAND.AMBER} stopOpacity="0"/>

        <marker id={`arr-${id}`} viewBox="0 0 10 10" refX="8" refY="5" markerWidth="5" markerHeight="5" orient="auto">
          <path d="M 0 0 L 10 5 L 0 10 z" fill={mono ? 'currentColor' : BRAND.TEAL_MID}/>

      <circle cx="60" cy="60" r="50" fill="none" stroke={c(BRAND.TEAL_MID)} strokeWidth="0.6" opacity="0.25"/>
      {edges.map(([a, b], i) => (
        <line key={i} x1={nodes[a].x} y1={nodes[a].y} x2={nodes[b].x} y2={nodes[b].y}
          stroke={mono ? 'currentColor' : `url(#flux-${id})`} strokeWidth="1.1" opacity={mono ? 0.5 : 0.75}/>
      ))}
      <path d="M 24 22 Q 50 0 86 28" fill="none" stroke={c(BRAND.TEAL_MID)} strokeWidth="1.6" markerEnd={`url(#arr-${id})`} opacity="0.85"/>
      <path d="M 38 78 Q 70 70 96 50" fill="none" stroke={c(BRAND.TEAL_DEEP)} strokeWidth="1.4" opacity="0.7"/>

      {!mono && <circle cx={nodes[amberIdx].x} cy={nodes[amberIdx].y} r="11" fill={`url(#glow2-${id})`}/>}
      {nodes.map((n, i) => (
        <circle key={i} cx={n.x} cy={n.y} r={n.r}
          fill={mono ? 'currentColor' : (i === warmIdx ? BRAND.WARM : i === amberIdx ? BRAND.AMBER : n.col)}
          stroke={(i === warmIdx || i === amberIdx) && !mono ? '#fff' : 'none'}
          strokeWidth={(i === warmIdx || i === amberIdx) && !mono ? 1.2 : 0}/>
      ))}
    </svg>
  );
}

function LogoWordmark({ dark = false }) {
  const fg = dark ? '#ffffff' : 'oklch(0.13 0.012 240)';
  return (
    <span style={{ fontSize: 16, fontWeight: 600, letterSpacing: '-0.015em', lineHeight: 1, color: fg, fontFamily: 'var(--font-sans)' }}>
      <span>Sys</span>
      <span style={{ color: dark ? BRAND.TEAL_LITE : BRAND.TEAL_DEEP }}>Bio</span>
      <span style={{ color: BRAND.TEAL_MID }}>Eng</span>
      <span style={{ fontWeight: 300, color: dark ? 'rgba(255,255,255,0.7)' : 'var(--fg-muted)', marginLeft: 4 }}>Lab</span>
    </span>
  );
}

function NetworkViz() {
  const nodes = [
    { x: 200, y: 120, r: 8 }, { x: 340, y: 80, r: 5 }, { x: 120, y: 220, r: 6 },
    { x: 280, y: 200, r: 10 }, { x: 400, y: 180, r: 5 }, { x: 160, y: 320, r: 7 },
    { x: 320, y: 300, r: 5 }, { x: 240, y: 380, r: 6 }, { x: 420, y: 290, r: 4 },
    { x: 80, y: 160, r: 4 }, { x: 360, y: 360, r: 5 }, { x: 460, y: 120, r: 4 },
  ];
  const edges = [
    [0,1],[0,3],[0,2],[1,3],[1,11],[2,5],[2,9],[3,4],[3,6],[3,7],[4,8],[5,6],[5,7],[6,7],[7,10],[8,10],[8,11],
  ];
  return (
    <svg viewBox="0 0 540 440" style={{ width: '100%', maxWidth: 460, opacity: 0.9 }} aria-hidden="true">
      {edges.map(([a, b], i) => (
        <line key={i}
          x1={nodes[a].x} y1={nodes[a].y} x2={nodes[b].x} y2={nodes[b].y}
          stroke="var(--accent)" strokeWidth="1" opacity="0.25"
        />
      ))}
      {nodes.map((n, i) => (
        <circle key={i} cx={n.x} cy={n.y} r={n.r}
          fill="none" stroke="var(--accent)"
          strokeWidth={i === 3 ? 2.5 : 1.5}
          opacity={i === 3 ? 0.9 : 0.5}
        />
      ))}
      {nodes.map((n, i) => (
        <circle key={`f${i}`} cx={n.x} cy={n.y} r={n.r * 0.4}
          fill="var(--accent)" opacity={i === 3 ? 0.7 : 0.3}
        />
      ))}
    </svg>
  );
}

/* ─── TWEAKS ─────────────────────────────────────────────── */
function AppTweaks() {
  const result = useTweaks(TWEAK_DEFAULTS);
  if (!result || !result.tweaks) return null;
  const { tweaks, setTweak } = result;

  React.useEffect(() => {
    document.documentElement.style.setProperty('--accent', tweaks.accentColor);
    const lum = tweaks.darkMode ? 0.15 : 0.985;
    document.documentElement.style.setProperty('--bg', tweaks.darkMode ? 'oklch(0.12 0.008 240)' : 'oklch(0.985 0.004 240)');
    document.documentElement.style.setProperty('--fg', tweaks.darkMode ? 'oklch(0.93 0.005 240)' : 'oklch(0.13 0.012 240)');
    document.documentElement.style.setProperty('--fg-muted', tweaks.darkMode ? 'oklch(0.65 0.01 240)' : 'oklch(0.45 0.012 240)');
    document.documentElement.style.setProperty('--border', tweaks.darkMode ? 'oklch(0.22 0.008 240)' : 'oklch(0.88 0.005 240)');
    document.documentElement.style.setProperty('--card-bg', tweaks.darkMode ? 'oklch(0.15 0.008 240)' : 'oklch(0.99 0.002 240)');
    document.documentElement.style.setProperty('font-size', `${tweaks.fontScale * 16}px`);
  }, [tweaks]);

  return (
    <TweaksPanel>
      <TweakSection title="Color">
        <TweakColor label="Accent color" value={tweaks.accentColor} onChange={v => setTweak('accentColor', v)} />
        <TweakToggle label="Dark mode" value={tweaks.darkMode} onChange={v => setTweak('darkMode', v)} />
      </TweakSection>
      <TweakSection title="Typography">
        <TweakSlider label="Font scale" value={tweaks.fontScale} min={0.85} max={1.2} step={0.05} onChange={v => setTweak('fontScale', v)} />
      </TweakSection>
    </TweaksPanel>
  );
}

/* ─── APP ────────────────────────────────────────────────── */
function App() {
  const [active, setActive] = React.useState('Home');

  React.useEffect(() => {
    const sections = ['home', 'research', 'people', 'resources', 'publications', 'contact'];
    const labels = ['Home', 'Research', 'People', 'Resources', 'Publications', 'Contact'];
    const observer = new IntersectionObserver(entries => {
      entries.forEach(e => {
        if (e.isIntersecting) {
          const idx = sections.indexOf(e.target.id);
          if (idx !== -1) setActive(labels[idx]);
        }
      });
    }, { rootMargin: '-40% 0px -40% 0px' });
    sections.forEach(id => {
      const el = document.getElementById(id);
      if (el) observer.observe(el);
    });
    return () => observer.disconnect();
  }, []);

  return (
    <>
      <Nav active={active} setActive={setActive} />
      <main>
        <Hero />
        <Divider />
        <AboutSection />
        <Divider />
        <ProjectsSection />
        <PeopleSection />
        <ResourcesSection />
        <PublicationsSection />
      </main>
      <Footer />
      <AppTweaks />
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
